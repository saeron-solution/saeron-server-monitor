name: server-observability-edge

services:
  node-exporter:
    image: prom/node-exporter:v1.8.2
    command:
      - --path.rootfs=/host
      - --path.procfs=/host/proc
      - --path.sysfs=/host/sys
      - --collector.filesystem.mount-points-exclude=^/(dev|proc|sys|run|var/lib/docker/.+)($|/)
    ports:
      - "${NODE_EXPORTER_PORT:-9100}:9100"
    volumes:
      - /:/host:ro,rslave
    restart: unless-stopped

  ipmi-exporter:
    image: prometheuscommunity/ipmi-exporter:latest
    user: root
    command:
      - --web.listen-address=:9290
      - --native-ipmi
      - --config.file=/etc/ipmi_exporter/ipmi_local.yml
    ports:
      - "${IPMI_EXPORTER_PORT:-9290}:9290"
    privileged: true
    devices:
      - /dev/ipmi0:/dev/ipmi0
    volumes:
      - ./ipmi_exporter/ipmi_local.yml:/etc/ipmi_exporter/ipmi_local.yml:ro
    restart: unless-stopped

  nvidia-gpu-exporter:
    image: utkuozdemir/nvidia_gpu_exporter:latest
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    environment:
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: utility
    ports:
      - "${NVIDIA_GPU_EXPORTER_PORT:-9835}:9835"
    restart: unless-stopped

  promtail:
    image: grafana/promtail:3.1.1
    command:
      - -config.file=/etc/promtail/config.yml
      - -config.expand-env=true
    environment:
      LOKI_URL: ${LOKI_URL}
      NODE_NAME: ${NODE_NAME:-edge-node}
    volumes:
      - ./promtail/config.yml:/etc/promtail/config.yml:ro
      - /var/log:/var/log:ro
      - promtail_positions:/tmp
    restart: unless-stopped

volumes:
  promtail_positions:
