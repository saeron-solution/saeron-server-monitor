# ============================================================================
# Edge Node Prometheus Scrape Targets
# ============================================================================
# Add or remove nodes here. Central Prometheus will scrape all targets.
# 
# DNS Resolution:
# - If DNS is available, use hostnames: gpu-node-01.local
# - If not, use IP addresses: 10.0.0.21
#
# Port numbers should match NODE_EXPORTER_PORT, IPMI_EXPORTER_PORT, etc.
# from each edge node's .env file.

# Node Exporter (CPU, Memory, Disk, Load)
- job_name: node-exporter
  static_configs:
    - targets:
        - gpu-node-01:9100
        - gpu-node-02:9100
      labels:
        host: gpu-node-01
    - targets:
        - gpu-node-02:9100
      labels:
        host: gpu-node-02

# IPMI Exporter (Hardware Sensors, Fans, Temperature)
- job_name: ipmi-exporter
  static_configs:
    - targets:
        - gpu-node-01:9290
        - gpu-node-02:9290
      labels:
        hardware: supermicro

# NVIDIA GPU Exporter (GPU Utilization, Memory, Temperature)
- job_name: nvidia-gpu-exporter
  static_configs:
    - targets:
        - gpu-node-01:9835
        - gpu-node-02:9835
      labels:
        hardware: nvidia-gpu

