global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["prometheus:9090"]

  - job_name: node_exporter
    static_configs:
      - targets: ["SOURCE_HOST_OR_IP:9100"]

  - job_name: ipmi_exporter
    static_configs:
      - targets: ["SOURCE_HOST_OR_IP:9290"]

  - job_name: nvidia_gpu_exporter
    static_configs:
      - targets: ["SOURCE_HOST_OR_IP:9835"]
