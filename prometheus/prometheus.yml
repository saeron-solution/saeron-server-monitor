global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - localhost:9090
        labels:
          host: gpu-73
          role: central
          site: local

  - job_name: node_exporter
    file_sd_configs:
      - files:
          - /etc/prometheus/targets/node-exporter.yml
        refresh_interval: 30s

  - job_name: ipmi_exporter
    scrape_timeout: 10s
    file_sd_configs:
      - files:
          - /etc/prometheus/targets/ipmi-exporter.yml
        refresh_interval: 30s

  - job_name: nvidia_gpu_exporter
    file_sd_configs:
      - files:
          - /etc/prometheus/targets/nvidia-gpu-exporter.yml
        refresh_interval: 30s
