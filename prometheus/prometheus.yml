global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # Prometheus self-monitoring
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  # Load edge node targets from external file
  - job_name: edge-nodes
    file_sd_configs:
      - files:
          - /etc/prometheus/targets/edge-nodes.yml
        refresh_interval: 30s
